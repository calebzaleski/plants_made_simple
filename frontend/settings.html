<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Settings - Authentication</title>
    <!-- Link to our new centralized CSS file -->
    <link rel="stylesheet" href="settings.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="settings-wrapper">
    <!-- Inject the Navbar right here -->
    <div id="navbar"></div>

    <!-- View for users who are NOT logged in -->
    <div id="unauthenticated-view">
        <div class="auth-container">
        
        <!-- Login Card -->
        <div class="auth-card">
            <h1>Login</h1>
            <div class="form-group">
                <input type="text" id="username-login" placeholder="Username">
            </div>
            <div class="form-group">
                <!-- Note: I fixed your placeholder here. It said 'Last Name' previously! -->
                <input type="password" id="password-login" placeholder="Password">
            </div>
            <button type="button" id="login-btn">Log In</button>
        </div>

        <!-- Create Account Card -->
        <div class="auth-card">
            <h1>Create Account</h1>
            <div class="form-group">
                <input type="text" id="username-create" placeholder="Username">
            </div>
            <div class="form-group">
                <input type="text" id="nickname" placeholder="Nickname (optional)">
            </div>
            <div class="form-group">
                <input type="email" id="email" placeholder="Email">
            </div>
            <div class="form-group">
                <input type="password" id="password-create" placeholder="Password">
            </div>
            <div class="form-group">
                <input type="text" id="firstname" placeholder="First Name">
            </div>
            <div class="form-group">
                <input type="text" id="lastname" placeholder="Last Name">
            </div>
            <button type="button" id="create-btn">Sign Up</button>
        </div>

        </div>
    </div>

    <!-- View for users who ARE logged in -->
    <div id="authenticated-view" style="display: none;">
        <h1>Account Settings</h1>
        <div class="edit-view">
            <div class="edit-card">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="edit-username" placeholder="caleb_is_cool">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="edit-email" placeholder="something@icloud.com">
                </div>
                <div class="form-group">
                    <label>Nickname</label>
                    <input type="text" id="edit-nickname" placeholder="CZ">
                </div>
                <div class="form-group">
                    <label>Firstname</label>
                    <input type="text" id="edit-firstname" placeholder="Caleb">
                </div>
                <div class="form-group">
                    <label>Lastname</label>
                    <input type="text" id="edit-lastname" placeholder="Zaleski">
                </div>
                <div class="form-group">
                    <label>Current Password (required to save changes)</label>
                    <input type="password" id="edit-current-password" placeholder="Enter your current password">
                </div>
                <div class="submit-btn">
                    <button type="button" id="save-settings-btn" class="modal-submit-btn">Save Changes</button>
                    <button type="button" id="logout-btn">Log Out</button>
                </div>
                <p id="settings-feedback" style="margin-top: 10px; font-weight: 500;"></p>
            </div>
        </div>


    </div>
</div>

    <!-- Scripts to load navbar and handle login logic -->
    <script>
        fetch('navbar.html')
          .then(response => response.text())
          .then(data => {
            document.getElementById('navbar').innerHTML = data;
            
            // Update the greeting name (preventing "undefined" glitch)
            let storedname = localStorage.getItem("firstname");
            if (!storedname || storedname === "undefined" || storedname === "null") {
                storedname = "there friend";
            }
            let nameElement = document.getElementById('nav-firstname');
            if (nameElement) nameElement.textContent = storedname;
          });

        // IF DISPLAY LOGIC: Check if the user actually has a valid token
        let token = localStorage.getItem("token");
        if (token && token !== "undefined" && token !== "null") {
            // Hide the login/signup form and show the logged-in settings
            document.getElementById('unauthenticated-view').style.display = 'none';
            document.getElementById('authenticated-view').style.display = 'flex';
        }

        // Add logout functionality for the new button
        document.getElementById('logout-btn')?.addEventListener('click', () => {
            localStorage.removeItem("token");
            localStorage.removeItem("firstname");
            window.location.reload(); // Refresh the page to show the login screen again
        });

    </script>
    <script src="dashboard.js"></script>
    <script src="display.js"></script>
</body>
</html>
